<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriPel - Painel de Gestão</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
       <aside class="sidebar">
            <h2>PriPel Gestão</h2>
            <nav>
                <ul>
                    <li class="active"><a href="#" id="menu-venda">Lançar Venda</a></li>
                    <li><a href="#" id="menu-despesa">Lançar Despesa</a></li>
                    <li><a href="#" id="menu-cronograma">Cronograma</a></li>
                    <li><a href="#" id="menu-precificacao">Precificação</a></li>
                </ul>
            </nav>
        </aside>
        
        <main class="content">
            
            <div class="card" id="tela-venda">
                <h1>Registrar Nova Venda</h1>
                <form id="formVenda" class="form-grid">
                    <div class="form-group full-width">
                        <button type="submit" id="btnEnviarVenda">Salvar Venda</button>
                        <p id="mensagemVenda"></p>
                    </div>
                </form>
            </div>

            <div class="card" id="tela-despesa" style="display: none;">
                <h1>Registrar Nova Despesa</h1>
                <form id="formDespesa" class="form-grid">
                    <div class="form-group">
                        <label>Vencimento:</label>
                        <input type="date" id="dataDespesa" required>
                    </div>
                    <div class="form-group">
                        <label>Categoria:</label>
                        <input type="text" id="categoriaDespesa" placeholder="Ex: Fornecedor, Luz, Água" required>
                    </div>
                    <div class="form-group">
                        <label>Valor (R$):</label>
                        <input type="number" step="0.01" id="valorDespesa" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>Status:</label>
                        <select id="statusDespesa">
                            <option value="Pendente">Pendente</option>
                            <option value="Pago">Pago</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <button type="submit" id="btnEnviarDespesa">Salvar Despesa</button>
                        <p id="mensagemDespesa"></p>
                    </div>
                </form>
            </div>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
