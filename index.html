<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriPel - Painel de Gestão</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <h2>PriPel Gestão</h2>
            <nav>
                <ul>
                    <li class="active"><a href="#">Lançar Venda</a></li>
                    <li><a href="#">Lançar Despesa</a></li>
                    <li><a href="#">Cronograma</a></li>
                    <li><a href="#">Precificação</a></li>
                </ul>
            </nav>
        </aside>
        
        <main class="content">
            <div class="card">
                <h1>Registrar Nova Venda</h1>
                
                <form id="formVenda" class="form-grid">
                    <div class="form-group">
                        <label>Data:</label>
                        <input type="date" id="data" required>
                    </div>

                    <div class="form-group">
                        <label>Cliente:</label>
                        <input type="text" id="cliente" placeholder="Nome do cliente" required>
                    </div>

                    <div class="form-group">
                        <label>Produto:</label>
                        <input type="text" id="produto" placeholder="O que foi vendido?" required>
                    </div>

                    <div class="form-group">
                        <label>Valor (R$):</label>
                        <input type="number" step="0.01" id="valor" placeholder="0.00" required>
                    </div>

                    <div class="form-group full-width">
                        <label>Status do Pagamento:</label>
                        <select id="status">
                            <option value="Pago">Pago</option>
                            <option value="Pendente">Pendente</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <button type="submit" id="btnEnviar">Salvar Venda</button>
                        <p id="mensagem"></p>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
